<!DOCTYPE html>
<html>
<head>
  <title>Search Analytics</title>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: sans-serif;
      margin: 2rem;
    }
    input {
      padding: 0.5rem;
      width: 100%;
      font-size: 1.2rem;
    }
    #status {
      margin-top: 1rem;
      color: green;
    }
  </style>
</head>
<body>
  <h1>Real-Time Article Search</h1>
  <input type="text" id="searchBox" placeholder="Type something..." />

  <p id="status"></p>

  <script>
    const searchBox = document.getElementById("searchBox");
    const statusText = document.getElementById("status");

    let timeout = null;

    searchBox.addEventListener("input", function () {
      const query = this.value.trim();

      // Cancel previous request if still waiting
      clearTimeout(timeout);

      if (query === "") {
        statusText.textContent = "";
        return;
      }

      // Debounce the request (600ms)
      timeout = setTimeout(() => {
        fetch("/searches", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ query })
        })
        .then((res) => {
          if (res.ok) {
            statusText.textContent = `✔️ Query sent: "${query}"`;
          } else {
            statusText.textContent = "⚠️ Error: Could not send query";
          }
        })
        .catch((err) => {
          console.error("Fetch error:", err);
          statusText.textContent = "⚠️ Network error";
        });
      }, 600);
    });
  </script>
</body>
</html>
